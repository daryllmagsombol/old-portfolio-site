[build]
  command   = ""
  publish   = "."

# Redirect all 404s to index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files: short cache since they're the entry points
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
